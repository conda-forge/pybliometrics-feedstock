schema_version: 1

context:
  name: pybliometrics
  version: "4.4.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pybliometrics-${{ version }}.tar.gz
  sha256: b7d1e1687aadbdba4a1075c2bfb5b3fc06842d2b5ca58a1c215116ad639bb17d

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.2
    - setuptools-scm >=6.2
    - pip
  run:
    - python >=${{ python_min }}
    - requests
    - tqdm
    - urllib3

tests:
  - python:
      imports:
        - pybliometrics
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Python-based API-Wrapper to access Scopus
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pybliometrics-dev/pybliometrics

extra:
  recipe-maintainers:
    - jan-janssen
